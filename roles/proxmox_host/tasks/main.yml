---
# roles/proxmox_host/tasks/main.yml
# Prepares the Proxmox host SSD layout and optionally mounts a NAS via NFS.
# Run via 0_prepare_host.yml — safe to re-run at any time.

# --- Postfix aliases ---
# Debian ships /etc/aliases but doesn't build its hash db, so postfix's
# local mailer logs "open database /etc/aliases.db: No such file or
# directory" on every delivery attempt (e.g. cron mail to root).
- name: Generate postfix aliases database
  command: newaliases
  args:
    creates: /etc/aliases.db

# --- Apt repos ---
# pve-enterprise.sources is enabled by default but 401s without a paid
# subscription, breaking `apt-get update`. Disable it in favor of
# pve-no-subscription (already enabled in pve-install-repo.list).
- name: Disable pve-enterprise apt repo (no subscription)
  copy:
    dest: /etc/apt/sources.list.d/pve-enterprise.sources
    content: |
      Types: deb
      URIs: https://enterprise.proxmox.com/debian/pve
      Suites: trixie
      Components: pve-enterprise
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
      Enabled: false
    mode: '0644'

# --- Create all media directories ---
- name: Create media directory tree
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ media_root }}"
    - "{{ media_movies }}"
    - "{{ media_tv }}"
    - "{{ media_music }}"
    - "{{ media_books }}"
    - "{{ media_downloads }}"
    - "{{ media_downloads_done }}"
    - "{{ media_downloads_inc }}"

# --- Create appdata directories ---
# Owned by 100000:100000 (root inside unprivileged LXCs maps to this host UID/GID),
# matching the convention already used for /mnt/ssd2tb media directories.
- name: Create appdata directories
  file:
    path: "{{ appdata_base }}/{{ item }}"
    state: directory
    mode: '0755'
    owner: '100000'
    group: '100000'
  loop:
    - pihole
    - semaphore
    - forgejo

# --- NFS mount (future NAS — no-op until nfs_enabled: true) ---
- name: Install NFS client
  apt:
    name: nfs-common
    state: present
  when: nfs_enabled | bool

- name: Mount NAS media share via NFS
  mount:
    path: "{{ media_root }}"
    src: "{{ nfs_server }}:{{ nfs_export }}"
    fstype: nfs
    opts: defaults,_netdev,nofail,x-systemd.automount
    state: mounted
  when: nfs_enabled | bool

- name: Ensure media_root is not NFS-mounted (local mode)
  mount:
    path: "{{ media_root }}"
    state: unmounted
  when: not nfs_enabled | bool
  # This is a no-op if it was never mounted — safe to run always
  ignore_errors: true
