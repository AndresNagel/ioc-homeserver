---
# roles/flaresolverr/tasks/main.yml
# Installs FlareSolverr (Cloudflare-bypass proxy for Prowlarr) as a systemd
# service, matching the hand-built container. Stateless — no config or data
# to persist between rebuilds. Bundles its own Chromium; these packages
# provide the Xvfb display and Chrome runtime libraries it needs.

- name: Install Xvfb and Chrome runtime dependencies
  apt:
    name:
      - xvfb
      - libnss3
      - libatk1.0-0
      - libatk-bridge2.0-0
      - libcups2
      - libdrm2
      - libgbm1
      - libasound2
      - libpango-1.0-0
      - libxcomposite1
      - libxdamage1
      - libxfixes3
      - libxrandr2
      - libxkbcommon0
      - libxtst6
      - libx11-xcb1
    state: present
    update_cache: true

- name: Get latest FlareSolverr release info
  uri:
    url: https://api.github.com/repos/FlareSolverr/FlareSolverr/releases/latest
    return_content: true
  register: flaresolverr_release

- name: Set flaresolverr version fact
  set_fact:
    flaresolverr_version: "{{ flaresolverr_release.json.tag_name | regex_replace('^v', '') }}"

- name: Download FlareSolverr release
  get_url:
    url: "https://github.com/FlareSolverr/FlareSolverr/releases/download/v{{ flaresolverr_version }}/flaresolverr_linux_x64.tar.gz"
    dest: /tmp/flaresolverr.tar.gz
    mode: '0644'
    force: true

- name: Extract FlareSolverr to /opt
  unarchive:
    src: /tmp/flaresolverr.tar.gz
    dest: /opt
    remote_src: true
  notify: Restart flaresolverr

- name: Install systemd service
  copy:
    dest: /etc/systemd/system/flaresolverr.service
    content: |
      [Unit]
      Description=Flaresolverr
      After=network.target

      [Service]
      ExecStart=/opt/flaresolverr/flaresolverr
      Environment=LOG_LEVEL=info
      User=root
      Restart=always

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify:
    - Reload systemd
    - Restart flaresolverr

- name: Enable and start flaresolverr
  systemd:
    name: flaresolverr
    enabled: true
    state: started
    daemon_reload: true
