---
# roles/homepage/tasks/main.yml
# Deploys the Homepage dashboard (docker container on the Proxmox host,
# /opt/homepage, port 3000) as a replacement for Homarr/dashdot, which were
# decommissioned after AppArmor 4.x (PVE9/trixie) broke their AF_UNIX-based
# child process IPC.

- name: Ensure /opt/homepage/config directory exists
  file:
    path: /opt/homepage/config
    state: directory
    mode: '0755'

- name: Deploy Homepage docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /opt/homepage/docker-compose.yml
    mode: '0644'

- name: Deploy Homepage config files
  copy:
    src: "config/{{ item }}"
    dest: "/opt/homepage/config/{{ item }}"
    mode: '0644'
  loop:
    - settings.yaml
    - widgets.yaml
    - bookmarks.yaml

# services.yaml is templated (not copied) so it can reference widget API
# keys — see 4_homepage_widgets.yml, which renders it from
# templates/services.yaml.j2. Provide a no-widgets placeholder here so
# Homepage has something to load on first boot, before that playbook runs.
- name: Deploy placeholder Homepage services.yaml (first boot only)
  copy:
    src: config/services.yaml
    dest: /opt/homepage/config/services.yaml
    mode: '0644'
    force: false

# .env supplies the {{HOMEPAGE_VAR_*}} secrets referenced by services.yaml;
# docker-compose's env_file requires it to exist. Real content comes from
# 4_homepage_widgets.yml — this just ensures `docker compose up` doesn't
# fail on a fresh deploy before that's been run.
- name: Ensure Homepage .env file exists (first boot only)
  copy:
    content: ""
    dest: /opt/homepage/.env
    mode: '0600'
    force: false

- name: Start Homepage
  command: docker compose up -d
  args:
    chdir: /opt/homepage
  register: homepage_up
  changed_when: "'Creating' in homepage_up.stderr or 'Recreating' in homepage_up.stderr or 'Starting' in homepage_up.stderr"
