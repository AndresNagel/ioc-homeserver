---
# roles/bazarr/tasks/main.yml
# Installs Bazarr (subtitle manager for Sonarr/Radarr) from the official
# release zip into a Python venv, matching the bare-metal pattern used by
# roles/arr. Config/database lives at /var/lib/bazarr, bind-mounted from
# the host (mp1) — on a rebuild the existing config/API key is picked up
# as-is. /data (mp0) gives Bazarr access to the same media library as
# Sonarr/Radarr so it can read/write subtitle files.

- name: Install dependencies
  apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - python3-dev
      - build-essential
      - unzip
    state: present
    update_cache: true

- name: Download Bazarr release
  get_url:
    url: https://github.com/morpheus65535/bazarr/releases/latest/download/bazarr.zip
    dest: /tmp/bazarr.zip
    mode: '0644'
    force: true

- name: Ensure /opt/bazarr exists
  file:
    path: /opt/bazarr
    state: directory
    mode: '0755'

- name: Extract Bazarr to /opt
  unarchive:
    src: /tmp/bazarr.zip
    dest: /opt/bazarr
    remote_src: true
  notify: Restart bazarr

- name: Ensure data directory exists
  file:
    path: /var/lib/bazarr
    state: directory
    mode: '0755'

- name: Install Bazarr's Python dependencies into a venv
  pip:
    requirements: /opt/bazarr/requirements.txt
    virtualenv: /opt/bazarr/venv
    virtualenv_command: python3 -m venv
  notify: Restart bazarr

- name: Install systemd service
  copy:
    dest: /etc/systemd/system/bazarr.service
    content: |
      [Unit]
      Description=Bazarr Daemon
      After=network.target

      [Service]
      User=root
      Group=root
      Type=simple
      WorkingDirectory=/opt/bazarr
      ExecStart=/opt/bazarr/venv/bin/python3 /opt/bazarr/bazarr.py -c /var/lib/bazarr --no-update
      TimeoutStopSec=20
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify:
    - Reload systemd
    - Restart bazarr

- name: Enable and start bazarr
  systemd:
    name: bazarr
    enabled: true
    state: started
    daemon_reload: true

# Bazarr's SQLite connection only sets PRAGMA foreign_keys=ON, leaving the
# database in the default DELETE journal mode with busy_timeout=0. Under
# concurrent access (scheduler jobs + Sonarr/Radarr SignalR listeners + UI)
# this throws "database is locked" errors during subtitle searches. WAL mode
# lets readers run alongside a writer and is persisted in the db file itself.
- name: Check Bazarr database exists
  stat:
    path: /var/lib/bazarr/db/bazarr.db
  register: bazarr_db_stat

- name: Check current Bazarr SQLite journal mode
  command: sqlite3 /var/lib/bazarr/db/bazarr.db "PRAGMA journal_mode;"
  register: bazarr_journal_mode
  changed_when: false
  when: bazarr_db_stat.stat.exists

- name: Switch Bazarr database to WAL journal mode
  when: bazarr_db_stat.stat.exists and bazarr_journal_mode.stdout != 'wal'
  block:
    - name: Stop bazarr before changing journal mode
      systemd:
        name: bazarr
        state: stopped

    - name: Set WAL journal mode on Bazarr database
      command: sqlite3 /var/lib/bazarr/db/bazarr.db "PRAGMA journal_mode=WAL;"

    - name: Start bazarr
      systemd:
        name: bazarr
        state: started

    - name: Wait for Bazarr to come back up
      wait_for:
        port: 6767
        delay: 2

# Set the web UI login to admin:admin via Bazarr's own settings API (same
# call its frontend makes) — config.yaml's password field is hashed, so it
# can't be edited directly.
- name: Read Bazarr API key
  command: >-
    python3 -c
    "import re; text = open('/var/lib/bazarr/config/config.yaml').read();
    block = re.search(r'^auth:\n(?:  .+\n)*', text, re.M).group(0);
    print(re.search(r'  apikey: (.+)', block).group(1).strip())"
  register: bazarr_api_key
  changed_when: false
  no_log: true

- name: Get current Bazarr settings
  uri:
    url: "http://localhost:6767/api/system/settings?apikey={{ bazarr_api_key.stdout }}"
    return_content: true
  register: bazarr_settings
  no_log: true

- name: Set admin:admin login for Bazarr
  uri:
    url: "http://localhost:6767/api/system/settings?apikey={{ bazarr_api_key.stdout }}"
    method: POST
    body_format: form-urlencoded
    body:
      settings-auth-type: form
      settings-auth-username: admin
      settings-auth-password: admin
    status_code: [200, 204]
  no_log: true
  when: bazarr_settings.json.auth.username != 'admin' or bazarr_settings.json.auth.type != 'form'
  notify: Restart bazarr

# opensubtitlescom's free tier caps at ~20 downloads/day, which throttles
# the whole provider list for hours once the library's missing-subtitle
# backlog exceeds that. Add fallback providers so searches still find
# subtitles while opensubtitlescom is throttled: podnapisi/subf2m/gestdown
# need no account, subdl needs the free API key stored in vault.
- name: Add fallback subtitle providers
  uri:
    url: "http://localhost:6767/api/system/settings?apikey={{ bazarr_api_key.stdout }}"
    method: POST
    body_format: form-urlencoded
    body:
      settings-general-enabled_providers: "{{ bazarr_settings.json.general.enabled_providers | union(['podnapisi', 'subf2m', 'gestdown', 'subdl']) }}"
      settings-subdl-api_key: "{{ bazarr_subdl_api_key }}"
    status_code: [200, 204]
  no_log: true
  when: >-
    (['podnapisi', 'subf2m', 'gestdown', 'subdl'] | difference(bazarr_settings.json.general.enabled_providers)) | length > 0
    or bazarr_settings.json.subdl.api_key != bazarr_subdl_api_key
