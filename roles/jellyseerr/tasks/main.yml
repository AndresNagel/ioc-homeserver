---
# roles/jellyseerr/tasks/main.yml
# Jellyseerr (rebranded upstream to "Seerr") ships no pre-built release
# tarball, only Docker images — so we build from source per the documented
# manual-install path. App code lives in /opt/jellyseerr (not backed up);
# config/db lives in /var/lib/jellyseerr (bind-mounted, backed up) via
# CONFIG_DIRECTORY.

- name: Install build dependencies
  apt:
    name:
      - git
      - curl
      - ca-certificates
      - build-essential
      - python3
    state: present
    update_cache: true

- name: Ensure apt keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add NodeSource apt key
  shell: curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
  args:
    creates: /etc/apt/keyrings/nodesource.gpg

- name: Add NodeSource apt repo (Node.js 22.x)
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main"
    state: present
    filename: nodesource

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install pnpm
  command: npm install -g pnpm@10
  args:
    creates: /usr/lib/node_modules/pnpm/bin/pnpm.cjs

- name: Clone/update Jellyseerr source
  git:
    repo: https://github.com/seerr-team/seerr.git
    dest: /opt/jellyseerr
    version: main
  register: jellyseerr_src

- name: Ensure config directory exists
  file:
    path: /var/lib/jellyseerr
    state: directory
    mode: '0755'

- name: Install Jellyseerr dependencies
  command: pnpm install --frozen-lockfile
  args:
    chdir: /opt/jellyseerr
  environment:
    CYPRESS_INSTALL_BINARY: "0"
  when: jellyseerr_src.changed
  notify: Restart jellyseerr

- name: Build Jellyseerr
  command: pnpm build
  args:
    chdir: /opt/jellyseerr
  when: jellyseerr_src.changed
  notify: Restart jellyseerr

- name: Ensure /etc/jellyseerr exists
  file:
    path: /etc/jellyseerr
    state: directory
    mode: '0755'

- name: Install environment file
  copy:
    dest: /etc/jellyseerr/jellyseerr.conf
    content: |
      PORT=5055
      CONFIG_DIRECTORY=/var/lib/jellyseerr
    mode: '0644'
  notify: Restart jellyseerr

- name: Install systemd service
  copy:
    dest: /etc/systemd/system/jellyseerr.service
    content: |
      [Unit]
      Description=Jellyseerr Service
      Wants=network-online.target
      After=network-online.target

      [Service]
      EnvironmentFile=/etc/jellyseerr/jellyseerr.conf
      Environment=NODE_ENV=production
      Type=exec
      Restart=on-failure
      WorkingDirectory=/opt/jellyseerr
      ExecStart=/usr/bin/node dist/index.js

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify:
    - Reload systemd
    - Restart jellyseerr

- name: Enable and start jellyseerr
  systemd:
    name: jellyseerr
    enabled: true
    state: started
    daemon_reload: true
