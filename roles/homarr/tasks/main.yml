---
# roles/homarr/tasks/main.yml
# Brings the existing hand-built Homarr dashboard (docker container on the
# Proxmox host, /opt/homarr, port 7575) under Ansible management. The
# managed default.json includes a tile for every Ansible-managed LXC
# service (the original hand-built config was missing Jellyfin, Radarr and
# Semaphore).

- name: Ensure /opt/homarr directories exist
  file:
    path: "/opt/homarr/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - configs
    - icons

- name: Deploy Homarr docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /opt/homarr/docker-compose.yml
    mode: '0644'

- name: Deploy default dashboard config (won't overwrite an existing/customized one)
  copy:
    src: default.json
    dest: /opt/homarr/configs/default.json
    mode: '0644'
    force: false

- name: Start Homarr
  command: docker-compose up -d
  args:
    chdir: /opt/homarr
  register: homarr_up
  changed_when: "'Creating' in homarr_up.stderr or 'Recreating' in homarr_up.stderr or 'Starting' in homarr_up.stderr"
