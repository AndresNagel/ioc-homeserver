---
# --- Proxmox ---
proxmox_host: 192.168.1.253           # your Proxmox node IP
proxmox_node: proxmox                 # your Proxmox node name (check PVE UI top-right)
proxmox_storage: local-lvm            # storage for container rootfs
proxmox_bridge: vmbr0
proxmox_gateway: 192.168.1.254
proxmox_dns: 192.168.1.254            # router; avoids bootstrap chicken-and-egg when (re)creating pihole itself
proxmox_template: local:vztmpl/debian-12-standard_12.7-1_amd64.tar.zst

# --- Proxmox API auth ---
# Must be root@pam: Proxmox hardcodes "Only root can pass arbitrary filesystem
# paths" for LXC bind mounts (mp0/mp1/...), so the least-privilege ansible@pve
# token cannot create containers with bind-mounted appdata/media directories.
proxmox_api_user: root@pam
proxmox_api_token_id: automation
# proxmox_api_token_secret comes from vault.yml

# --- SSH keys to authorize for root on every LXC (matches existing containers) ---
proxmox_ssh_authorized_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFAMs3638qDEv2aV+iqpfSzOHKris8Njf+XwHZYqkj07 shishkaberry@kiwi"
  - "ssh-rsa  root@proxmox"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINapB74lf9QBlqFEKNi8QDUu6XAyiK89M6NSPawUdt2d semaphore-automation@homeserver"

# --- Timezone ---
timezone: Europe/Madrid               # change to your TZ

# --- Caddy (reverse proxy / TLS for *.welpes.com) ---
# Used for Let's Encrypt expiry notices. caddy_cloudflare_api_token lives in vault.yml.
caddy_acme_email: andres.nagel.im@gmail.com

# --- App config data (survives container rebuilds) ---
appdata_base: /opt/appdata

# --- Media root (single mount point — never changes even when NAS is added) ---
# Everything lives under here. LXCs always see /mnt/media inside.
# Today: local SSD. Future: swap for NFS mount at the same path, zero LXC changes.
media_root: /mnt/media

# Subpaths — consistent inside every LXC that needs them
media_movies:           "{{ media_root }}/movies"
media_tv:               "{{ media_root }}/tv"
media_music:            "{{ media_root }}/music"
media_books:            "{{ media_root }}/books"
media_downloads:        "{{ media_root }}/downloads"
media_downloads_done:   "{{ media_root }}/downloads/complete"
media_downloads_inc:    "{{ media_root }}/downloads/incomplete"

# --- NFS (future NAS) ---
# Set nfs_enabled: true and fill these when you add a NAS.
# Run: ansible-playbook -i inventory.yml 0_prepare_host.yml
# All LXCs will transparently see the NAS — no other changes needed.
nfs_enabled: false
nfs_server: ""          # e.g. 192.168.1.50 or nas.local
nfs_export: ""          # e.g. /volume1/media
