---
# 2_configure_services.yml
# Run after containers are up. Installs and configures all services.
# Safe to re-run — all tasks are idempotent.
#
# Usage:
#   ansible-playbook -i inventory.yml 2_configure_services.yml --ask-vault-pass
#
# Run a single host only:
#   ansible-playbook -i inventory.yml 2_configure_services.yml --limit pihole

- name: Configure PiHole
  hosts: pihole
  roles:
    - pihole

- name: Configure Transmission
  hosts: transmission
  roles:
    - transmission

- name: Configure Sonarr
  hosts: sonarr
  roles:
    - arr
  vars:
    arr_app: sonarr
    arr_port: 8989
    # Sonarr v4 is served from services.sonarr.tv, not servarr.com/v1/update
    arr_download_url: "https://services.sonarr.tv/v1/download/main/latest?version=4&os=linux&arch=x64"

- name: Configure Radarr
  hosts: radarr
  roles:
    - arr
  vars:
    arr_app: radarr
    arr_port: 7878

- name: Configure Lidarr
  hosts: lidarr
  roles:
    - arr
  vars:
    arr_app: lidarr
    arr_port: 8686
    arr_api_version: v1

- name: Configure Prowlarr
  hosts: prowlarr
  roles:
    - arr
  vars:
    arr_app: prowlarr
    arr_port: 9696
    arr_api_version: v1

- name: Configure Audiobookshelf
  hosts: audiobookshelf
  roles:
    - audiobookshelf

- name: Configure Readarr
  hosts: readarr
  roles:
    - arr
  vars:
    arr_app: readarr
    arr_port: 8787
    arr_api_version: v1
    # Readarr uses "develop" as its stable branch (no "master" release channel)
    arr_download_url: "https://readarr.servarr.com/v1/update/develop/updatefile?os=linux&runtime=netcore&arch=x64"

- name: Configure Jellyfin
  hosts: jellyfin
  roles:
    - jellyfin

- name: Configure Navidrome
  hosts: navidrome
  roles:
    - navidrome

- name: Configure Semaphore
  hosts: semaphore
  roles:
    - semaphore

- name: Configure Forgejo
  hosts: forgejo
  roles:
    - forgejo

- name: Configure FlareSolverr
  hosts: flaresolverr
  roles:
    - flaresolverr

- name: Configure Bazarr
  hosts: bazarr
  roles:
    - bazarr

- name: Configure Caddy
  hosts: caddy
  roles:
    - caddy

- name: Configure Jellyseerr
  hosts: jellyseerr
  roles:
    - jellyseerr
